server {
    # Listen on standard port 80 (HTTP)
    listen 80;
    server_name votre-domaine.com; # Remplacez par votre nom de domaine ou IP de VPS

    # Max body size for uploads (allows uploading images or media files up to 20MB)
    client_max_body_size 20M;

    # Proxy headers
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;

    # Main location routing to internal port 1337
    location / {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
